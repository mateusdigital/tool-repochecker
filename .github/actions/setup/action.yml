name: "Project Setup"
description: "Install the project runtimes."

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.12"
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
